<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>王俊龙 ❤️ 贺一帆 - 我们的恋爱小屋</title>
<style>
/* ========== CSS Variables & Reset ========== */
:root {
  --pink: #ff6b9d;
  --pink-light: #ffb3cc;
  --pink-dark: #e84a7a;
  --rose: #ff8fab;
  --white: #fff;
  --bg: #fff5f7;
  --card: #ffffff;
  --text: #5a3e4b;
  --text-light: #8e6f7a;
  --gold: #f0c060;
  --shadow: 0 4px 20px rgba(255, 107, 157, 0.15);
  --radius: 20px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255, 107, 157, 0.05) 0%, transparent 50%),
    radial-gradient(circle at 90% 80%, rgba(255, 143, 171, 0.05) 0%, transparent 50%);
}

/* ========== Floating Hearts Background ========== */
.hearts-bg {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.heart-float {
  position: absolute; bottom: -100px;
  animation: floatUp 8s ease-in infinite;
  font-size: 24px; opacity: 0.3;
}
@keyframes floatUp {
  0% { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
  10% { opacity: 0.3; }
  90% { opacity: 0.3; }
  100% { transform: translateY(-110vh) rotate(360deg) scale(1); opacity: 0; }
}

/* ========== Main Container ========== */
.app-container {
  position: relative; z-index: 1;
  max-width: 500px; margin: 0 auto;
  min-height: 100vh; padding-bottom: 100px;
}

/* ========== Header ========== */
.header {
  text-align: center; padding: 30px 20px 20px;
  position: relative;
}
.header-mascots {
  display: flex; justify-content: center; align-items: center;
  gap: 16px; margin-bottom: 10px;
}
.mascot {
  width: 60px; height: 60px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; animation: bounce 2s ease-in-out infinite;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}
.mascot.yier { background: linear-gradient(135deg, #ffe0b2, #ffcc80); animation-delay: 0s; }
.mascot.bubu { background: linear-gradient(135deg, #f8bbd0, #f48fb1); animation-delay: 0.3s; }
@keyframes bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
.header h1 {
  font-size: 28px; font-weight: 800;
  background: linear-gradient(135deg, #ff6b9d, #e84a7a, #ff4081);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
}
.header .subtitle {
  font-size: 14px; color: var(--text-light); margin-top: 4px;
}
.header .hearts-icon { font-size: 20px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

/* ========== Navigation ========== */
.nav {
  display: flex; justify-content: space-around;
  background: var(--card); margin: 0 16px;
  border-radius: 30px; padding: 6px;
  box-shadow: var(--shadow); position: sticky; top: 10px; z-index: 100;
}
.nav-btn {
  flex: 1; padding: 12px 6px; border: none; background: transparent;
  border-radius: 26px; cursor: pointer; font-size: 13px; font-weight: 600;
  color: var(--text-light); transition: var(--transition);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.nav-btn .nav-icon { font-size: 20px; }
.nav-btn.active {
  background: linear-gradient(135deg, #ff6b9d, #ff8fab);
  color: white; box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3);
}

/* ========== Sections ========== */
.section { display: none; padding: 20px 16px; animation: fadeIn 0.4s ease; }
.section.active { display: block; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== Card ========== */
.card {
  background: var(--card); border-radius: var(--radius);
  padding: 24px 20px; margin-bottom: 16px;
  box-shadow: var(--shadow); transition: var(--transition);
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255, 107, 157, 0.2); }
.card-title {
  font-size: 18px; font-weight: 700; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card-title .icon { font-size: 24px; }

/* ========== Days Counter ========== */
.days-counter-card {
  background: linear-gradient(135deg, #ff6b9d, #ff4081);
  color: white; text-align: center; padding: 30px 20px;
}
.days-counter-card .label {
  font-size: 15px; opacity: 0.9; letter-spacing: 2px;
}
.days-number {
  font-size: 72px; font-weight: 900;
  line-height: 1; margin: 10px 0;
  text-shadow: 0 4px 15px rgba(0,0,0,0.15);
  animation: countIn 0.6s ease-out;
}
@keyframes countIn {
  from { transform: scale(0.5); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.days-counter-card .unit {
  font-size: 18px; opacity: 0.9;
}
.days-counter-card .start-date {
  font-size: 13px; opacity: 0.7; margin-top: 8px;
}

/* ========== Calendar ========== */
.calendar-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 12px;
}
.calendar-header button {
  background: none; border: none; font-size: 20px; cursor: pointer;
  color: var(--pink); padding: 4px 10px; border-radius: 10px;
  transition: var(--transition);
}
.calendar-header button:hover { background: rgba(255,107,157,0.1); }
.calendar-month { font-size: 16px; font-weight: 700; }
.calendar-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 6px; text-align: center;
}
.calendar-day-name {
  font-size: 12px; color: var(--text-light); font-weight: 600;
  padding: 8px 0;
}
.calendar-day {
  aspect-ratio: 1; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; cursor: pointer; transition: var(--transition);
  position: relative; border: none; background: transparent;
  font-family: inherit; color: var(--text);
}
.calendar-day:hover { background: rgba(255,107,157,0.1); }
.calendar-day.today {
  border: 2px solid var(--pink); font-weight: 700;
}
.calendar-day.checked {
  background: linear-gradient(135deg, #ff6b9d, #ff8fab);
  color: white; font-weight: 700;
  animation: popIn 0.3s ease;
}
@keyframes popIn {
  0% { transform: scale(0.5); }
  70% { transform: scale(1.15); }
  100% { transform: scale(1); }
}
.calendar-day.other-month { color: #ddd; cursor: default; }
.calendar-day.past-unchecked {
  color: #ccc;
}
.checkin-streak {
  text-align: center; margin-top: 14px;
  font-size: 14px; color: var(--pink);
  font-weight: 600;
}
.checkin-btn {
  display: block; margin: 16px auto 0;
  padding: 12px 36px; border: none;
  background: linear-gradient(135deg, #ff6b9d, #ff4081);
  color: white; font-size: 16px; font-weight: 700;
  border-radius: 30px; cursor: pointer;
  transition: var(--transition); letter-spacing: 1px;
  box-shadow: 0 4px 15px rgba(255, 107, 157, 0.35);
}
.checkin-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(255, 107, 157, 0.45); }
.checkin-btn:active { transform: scale(0.95); }
.checkin-btn:disabled {
  background: #ccc; cursor: not-allowed; box-shadow: none;
}
.checkin-btn:disabled:hover { transform: none; }

/* ========== Love Quote Modal ========== */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 999;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 0.3s ease;
}
.love-quote-card {
  background: white; border-radius: 24px;
  padding: 40px 30px; margin: 20px;
  text-align: center; max-width: 380px; width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  position: relative; animation: slideUp 0.4s ease;
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.love-quote-card .quote-icon {
  font-size: 50px; margin-bottom: 16px;
}
.love-quote-card .quote-text {
  font-size: 20px; font-weight: 700; color: #5a3e4b;
  line-height: 1.8; margin-bottom: 10px;
}
.love-quote-card .quote-from {
  font-size: 13px; color: #aaa;
}
.love-quote-card .close-btn {
  position: absolute; top: 12px; right: 16px;
  background: #f5f5f5; border: none; width: 32px; height: 32px;
  border-radius: 50%; font-size: 18px; cursor: pointer;
  color: #999; transition: var(--transition);
}
.love-quote-card .close-btn:hover { background: #eee; }
.sparkles {
  position: absolute; pointer-events: none;
}
.sparkle {
  position: absolute; font-size: 20px;
  animation: sparkleBurst 0.8s ease-out forwards;
}
@keyframes sparkleBurst {
  0% { transform: translate(0,0) scale(0); opacity: 1; }
  100% { transform: translate(var(--sx), var(--sy)) scale(1.2); opacity: 0; }
}

/* ========== Food Section ========== */
.food-subnav {
  display: flex; gap: 8px; margin-bottom: 16px;
  overflow-x: auto; padding-bottom: 4px;
}
.food-subnav button {
  flex-shrink: 0; padding: 10px 18px; border: 2px solid #f0d0d8;
  background: white; border-radius: 25px; cursor: pointer;
  font-size: 14px; font-weight: 600; color: var(--text);
  transition: var(--transition);
}
.food-subnav button.active {
  background: linear-gradient(135deg, #ff6b9d, #ff8fab);
  color: white; border-color: transparent;
}
.food-sub-panel { display: none; animation: fadeIn 0.3s ease; }
.food-sub-panel.active { display: block; }

/* Homemade dishes */
.dish-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
.dish-card {
  background: white; border-radius: 16px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer;
  transition: var(--transition);
}
.dish-card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
.dish-img {
  height: 120px; display: flex; align-items: center; justify-content: center;
  font-size: 56px;
}
.dish-info { padding: 12px; }
.dish-info .dish-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
.dish-info .dish-chef { font-size: 12px; color: var(--text-light); }
.dish-info .dish-tags { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
.dish-tag {
  font-size: 10px; padding: 3px 8px; border-radius: 10px;
  background: #fff0f3; color: var(--pink); font-weight: 500;
}
.add-dish-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; margin-top: 12px; padding: 14px;
  border: 2px dashed #f0c0d0; border-radius: 16px;
  background: transparent; cursor: pointer; color: var(--pink);
  font-size: 14px; font-weight: 600; width: 100%;
  transition: var(--transition);
}
.add-dish-btn:hover { background: #fff0f3; }

/* Takeout Lottery */
.lottery-container { text-align: center; }
.lottery-display {
  background: linear-gradient(135deg, #fff5f7, #ffe0e8);
  border-radius: 20px; padding: 30px; margin-bottom: 20px;
  min-height: 120px; display: flex; align-items: center;
  justify-content: center;
  position: relative; overflow: hidden;
}
.lottery-text {
  font-size: 28px; font-weight: 800; color: var(--pink-dark);
  transition: all 0.1s ease;
}
.lottery-text.rolling { animation: lotteryRoll 0.08s steps(1) infinite; }
@keyframes lotteryRoll {
  0% { opacity: 1; transform: translateY(0); }
  50% { opacity: 0.5; transform: translateY(-5px); }
  100% { opacity: 1; transform: translateY(0); }
}
.lottery-emoji { font-size: 60px; margin-bottom: 10px; }
.lottery-btn {
  padding: 16px 50px; border: none;
  background: linear-gradient(135deg, #ff6b9d, #ff4081);
  color: white; font-size: 18px; font-weight: 700;
  border-radius: 30px; cursor: pointer;
  transition: var(--transition);
  box-shadow: 0 4px 15px rgba(255, 107, 157, 0.35);
  letter-spacing: 2px;
}
.lottery-btn:hover { transform: scale(1.05); }
.lottery-btn:active { transform: scale(0.95); }
.lottery-history {
  margin-top: 16px; text-align: left;
}
.lottery-history h4 { font-size: 14px; color: var(--text-light); margin-bottom: 8px; }
.lottery-history-item {
  display: inline-block; padding: 6px 14px; margin: 3px;
  background: #f5f5f5; border-radius: 15px; font-size: 13px;
}

/* Snacks */
.snack-categories { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.snack-cat-btn {
  padding: 8px 16px; border: 1.5px solid #f0d0d8;
  background: white; border-radius: 20px; cursor: pointer;
  font-size: 13px; transition: var(--transition); color: var(--text);
}
.snack-cat-btn.active {
  background: var(--pink); color: white; border-color: var(--pink);
}
.snack-list { display: flex; flex-direction: column; gap: 8px; }
.snack-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; background: white; border-radius: 14px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.04); transition: var(--transition);
}
.snack-item:hover { transform: translateX(4px); }
.snack-emoji { font-size: 32px; }
.snack-name { font-weight: 600; font-size: 15px; }
.snack-brand { font-size: 12px; color: var(--text-light); }

/* ========== Story Section ========== */
.timeline {
  position: relative; padding-left: 30px;
}
.timeline::before {
  content: ''; position: absolute; left: 12px; top: 0; bottom: 0;
  width: 2px; background: linear-gradient(to bottom, #ff6b9d, #ffb3cc);
}
.story-item {
  position: relative; margin-bottom: 24px;
  background: white; border-radius: 16px; padding: 18px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  animation: fadeIn 0.3s ease;
}
.story-item::before {
  content: ''; position: absolute; left: -23px; top: 20px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--pink); border: 3px solid white;
  box-shadow: 0 0 0 2px var(--pink-light);
}
.story-date {
  font-size: 12px; color: var(--pink); font-weight: 600; margin-bottom: 6px;
}
.story-text {
  font-size: 15px; line-height: 1.7; color: var(--text);
  white-space: pre-wrap; word-break: break-word;
}
.story-images {
  display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
}
.story-images img {
  width: 80px; height: 80px; object-fit: cover;
  border-radius: 12px; cursor: pointer;
  transition: var(--transition);
}
.story-images img:hover { transform: scale(1.05); }
.story-video {
  width: 100%; max-width: 300px; border-radius: 12px; margin-top: 10px;
}
.story-actions {
  display: flex; gap: 10px; margin-top: 10px;
}
.story-actions button {
  padding: 6px 14px; border: none; background: #fff0f3;
  color: var(--pink); border-radius: 15px; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: var(--transition);
}
.story-actions button:hover { background: #ffe0e8; }
.story-comments {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid #f5f0f0;
}
.story-comment {
  font-size: 13px; padding: 4px 0; color: var(--text-light);
  display: flex; align-items: flex-start; gap: 6px;
}
.story-comment .comment-author { font-weight: 600; color: var(--pink); flex-shrink: 0; }
.add-story-btn {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; width: 100%; padding: 16px;
  border: 2px dashed #f0c0d0; border-radius: 16px;
  background: transparent; cursor: pointer; color: var(--pink);
  font-size: 15px; font-weight: 600; transition: var(--transition);
}
.add-story-btn:hover { background: #fff0f3; }

/* ========== Add Story Form ========== */
.form-card { display: none; margin-bottom: 16px; }
.form-card.show { display: block; animation: fadeIn 0.3s ease; }
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 14px; font-weight: 600;
  margin-bottom: 6px; color: var(--text);
}
.form-group textarea, .form-group input[type="text"], .form-group input[type="date"] {
  width: 100%; padding: 12px 14px; border: 2px solid #f0d8e0;
  border-radius: 14px; font-size: 14px; font-family: inherit;
  resize: vertical; transition: var(--transition);
  background: #fffafb; color: var(--text);
}
.form-group textarea:focus, .form-group input:focus {
  outline: none; border-color: var(--pink);
}
.form-group textarea { min-height: 80px; }
.form-group input[type="file"] { font-size: 13px; }
.form-actions { display: flex; gap: 10px; }
.form-actions button {
  flex: 1; padding: 12px; border: none; border-radius: 25px;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: var(--transition);
}
.btn-primary {
  background: linear-gradient(135deg, #ff6b9d, #ff4081);
  color: white;
}
.btn-secondary {
  background: #f5f5f5; color: var(--text);
}
.btn-danger {
  background: #fff0f0; color: #e74c3c;
}

/* ========== Profile Section ========== */
.profiles-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
}
.profile-card {
  background: white; border-radius: 20px; padding: 20px 16px;
  text-align: center; box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}
.profile-card.wjl { border-top: 4px solid #ff6b9d; }
.profile-card.hyf { border-top: 4px solid #f0c040; }
.profile-avatar {
  width: 80px; height: 80px; border-radius: 50%;
  margin: 0 auto 10px; display: flex; align-items: center;
  justify-content: center; font-size: 46px; cursor: pointer;
  overflow: hidden; position: relative;
  transition: var(--transition);
}
.profile-avatar:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(0,0,0,0.12); }
.profile-avatar.wjl-avatar { background: linear-gradient(135deg, #ffe0e8, #ffb3cc); }
.profile-avatar.hyf-avatar { background: linear-gradient(135deg, #dbe8f8, #b3cde8); }
.profile-avatar img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
  position: absolute; top: 0; left: 0;
}
.avatar-placeholder { position: relative; z-index: 1; pointer-events: none; }
.profile-name {
  font-size: 18px; font-weight: 800; margin-bottom: 4px;
}
.profile-role { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
.profile-fields { text-align: left; }
.profile-field {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #f8f0f0;
  font-size: 13px;
}
.profile-field .field-label { color: var(--text-light); font-weight: 500; }
.profile-field .field-value { font-weight: 600; cursor: pointer; }
.profile-field .field-value:hover { color: var(--pink); }
.edit-profile-btn {
  margin-top: 12px; padding: 8px 20px; border: 2px solid #f0d0d8;
  background: white; border-radius: 20px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--pink);
  transition: var(--transition); width: 100%;
}
.edit-profile-btn:hover { background: #fff0f3; }
.edit-profile-form {
  display: none; margin-top: 10px; text-align: left;
}
.edit-profile-form.show { display: block; }
.edit-profile-form input {
  width: 100%; padding: 8px 10px; margin-bottom: 8px;
  border: 1.5px solid #f0d0d8; border-radius: 10px;
  font-size: 13px; font-family: inherit; background: #fffafb;
  color: var(--text);
}
.edit-profile-form input:focus { outline: none; border-color: var(--pink); }
.edit-profile-form .save-btn {
  width: 100%; padding: 8px; border: none;
  background: var(--pink); color: white; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
}

/* ========== Fullscreen Image Viewer ========== */
.image-viewer {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}
.image-viewer img {
  max-width: 90%; max-height: 90%; border-radius: 10px;
}

/* ========== Toast ========== */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: #333; color: white; padding: 12px 24px;
  border-radius: 25px; font-size: 14px; font-weight: 600;
  z-index: 2000; animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
  pointer-events: none;
}
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
@keyframes toastOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* ========== Responsive ========== */
@media (max-width: 380px) {
  .header h1 { font-size: 24px; }
  .days-number { font-size: 56px; }
  .profiles-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- Floating Hearts Background -->
<div class="hearts-bg" id="heartsBg"></div>

<!-- Main App -->
<div class="app-container">
  <!-- Header -->
  <div class="header">
    <div class="header-mascots">

// ===== 云同步配置 =====
let useCloud = false;

function getDefaultData() {
  return {
    checkins: {},
    dishes: [...DEFAULT_DISHES],
    lotteryHistory: [],
    stories: [],
    profiles: {
      wjl: {
        name: '王俊龙', avatar: '', birthday: '', zodiac: '',

        name: '贺一帆', avatar: '', birthday: '', zodiac: '',
        mbti: '', hobbies: '', favoriteFood: '', dream: '', wechat: '',
      },
    },
  };
}

function mergeWithDefaults(data) {
  const defaults = getDefaultData();
  for (const key of Object.keys(defaults)) {
    if (!(key in data)) data[key] = defaults[key];
  }
  if (!data.dishes || data.dishes.length === 0) data.dishes = [...DEFAULT_DISHES];
  for (const person of ['wjl', 'hyf']) {
    if (!data.profiles[person]) data.profiles[person] = {...defaults.profiles[person]};
    for (const field of Object.keys(defaults.profiles[person])) {
      if (!(field in data.profiles[person])) data.profiles[person][field] = defaults.profiles[person][field];
    }
  }
  return data;
}

function loadLocalData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return mergeWithDefaults(JSON.parse(raw));
  } catch (e) {}
  return getDefaultData();
}

function saveLocalData(data) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (e) {
    if (e.name === 'QuotaExceededError') showToast('⚠️ 存储空间不足');
  }
}

let appData = loadLocalData();

// ===== 云同步：通过后端 API =====
const API_BASE = window.location.origin;

async function saveToCloud(data) {
  try {
    const res = await fetch(API_BASE + '/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    return res.ok;
  } catch (e) { return false; }
}

async function loadFromCloud() {
  try {
    const res = await fetch(API_BASE + '/api/data');
    if (res.ok) return await res.json();
  } catch (e) {}
  return null;
}

// Save data: cloud + local
function saveData(data) {
  saveLocalData(data);
  if (useCloud) saveToCloud(data);
}

// Smart merge: keep best data from both local and cloud
function smartMerge(local, cloud) {
  if (!cloud || Object.keys(cloud).length === 0) return local;
  const merged = JSON.parse(JSON.stringify(local));
  // Merge profiles: prefer non-empty values
  for (const person of ['wjl', 'hyf']) {
    if (!merged.profiles) merged.profiles = {};
    if (!merged.profiles[person]) merged.profiles[person] = {};
    if (cloud.profiles && cloud.profiles[person]) {
      for (const key of Object.keys(cloud.profiles[person])) {
        const cloudVal = cloud.profiles[person][key];
        const localVal = merged.profiles[person][key];
        // Prefer longer/non-empty values (avatar always prefer cloud if exists)
        if (key === 'avatar' && cloudVal && cloudVal.length > 100) {
          merged.profiles[person][key] = cloudVal;
        } else if (cloudVal && (!localVal || cloudVal.length > localVal.length)) {
          merged.profiles[person][key] = cloudVal;
        }
      }
    }
  }
  // Merge checkins: union
  if (cloud.checkins) {
    if (!merged.checkins) merged.checkins = {};
    for (const d of Object.keys(cloud.checkins)) {
      if (!merged.checkins[d]) merged.checkins[d] = cloud.checkins[d];
    }
  }
  // Merge arrays: use whichever has more data (more items or richer content)
  for (const arr of ['dishes', 'lotteryHistory', 'stories']) {
    const cArr = Array.isArray(cloud[arr]) ? cloud[arr] : Object.values(cloud[arr] || {});
    const lArr = Array.isArray(merged[arr]) ? merged[arr] : [];
    const cSize = JSON.stringify(cArr).length;
    const lSize = JSON.stringify(lArr).length;
    // Prefer the version with more data (images etc)
    if (cSize > lSize) merged[arr] = cArr;
    else if (lSize > cSize) { /* keep local, it's richer */ }
  }
  return merged;
}

// ===== 定时云同步 =====
let syncTimer = null;
function startCloudSync() {
  useCloud = true;
  let lastCloudJson = '';

  syncTimer = setInterval(async () => {
    const cloudData = await loadFromCloud();
    if (cloudData && Object.keys(cloudData).length > 0) {
      const cloudJson = JSON.stringify(cloudData);
      const localJson = JSON.stringify(appData);

      // Only act if cloud changed or local is different
      if (cloudJson !== lastCloudJson && cloudJson !== localJson) {
        lastCloudJson = cloudJson;
        // Smart merge: combine best of both
        appData = mergeWithDefaults(smartMerge(appData, cloudData));
        saveLocalData(appData);
        saveToCloud(appData);  // Push merged result back so everyone is in sync
        refreshAllUI();
      }
    }
  }, 2000);

  // Initial push
  saveToCloud(appData);

// ==================== DAYS COUNTER ====================
function getDaysTogether() {
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const start = new Date(START_DATE);
  start.setHours(0, 0, 0, 0);
  const diffTime = today - start;
  return Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
}

function updateDaysCounter() {
  const days = getDaysTogether();
  const el = document.getElementById('daysCount');
  el.textContent = days;
  // Re-animate
  el.style.animation = 'none';
  el.offsetHeight; // reflow
  el.style.animation = 'countIn 0.6s ease-out';
}

// ==================== CALENDAR ====================
let calendarYear, calendarMonth;

function initCalendar() {
  const today = new Date();
  calendarYear = today.getFullYear();
  calendarMonth = today.getMonth(); // 0-indexed
  renderCalendar();
}

function changeMonth(delta) {
  calendarMonth += delta;
  if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
  renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  const monthLabel = document.getElementById('calendarMonth');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const todayStr = formatDate(today);

  const monthNames = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
  monthLabel.textContent = calendarYear + '年' + monthNames[calendarMonth];

  // Day names
  const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
  let html = dayNames.map(d => `<div class="calendar-day-name">${d}</div>`).join('');

  // First day of month
  const firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
  const daysInMonth = new Date(calendarYear, calendarMonth + 1, 0).getDate();
  const daysInPrevMonth = new Date(calendarYear, calendarMonth, 0).getDate();

  // Previous month days
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrevMonth - i;
    html += `<div class="calendar-day other-month">${d}</div>`;
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = formatDate(new Date(calendarYear, calendarMonth, d));
    let cls = 'calendar-day';
    if (dateStr === todayStr) cls += ' today';
    if (appData.checkins[dateStr]) cls += ' checked';

    // Determine if past and unchecked (gray out)
    const thisDate = new Date(calendarYear, calendarMonth, d);
    thisDate.setHours(0, 0, 0, 0);
    const isPast = thisDate < today && dateStr !== todayStr;
    const isFuture = thisDate > today;
    if (isPast && !appData.checkins[dateStr]) cls += ' past-unchecked';

    html += `<div class="${cls}" data-date="${dateStr}" onclick="clickCalendarDay('${dateStr}', ${isFuture})">${d}</div>`;
  }

  // Remaining cells
  const totalCells = firstDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let d = 1; d <= remaining; d++) {
    html += `<div class="calendar-day other-month">${d}</div>`;
  }

  grid.innerHTML = html;
  updateCheckinButton();
  updateStreak();
}

function formatDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function clickCalendarDay(dateStr, isFuture) {
  if (isFuture) return; // Can't check in for future dates
  const todayStr = formatDate(new Date());
  if (dateStr === todayStr) {
    doCheckin();
  }
}

function updateCheckinButton() {
  const todayStr = formatDate(new Date());
  const btn = document.getElementById('checkinBtn');
  if (appData.checkins[todayStr]) {
    btn.textContent = '✅ 今日已打卡';
    btn.disabled = true;
  } else {
    btn.textContent = '💝 今日打卡';
    btn.disabled = false;
  }
}

function updateStreak() {
  let streak = 0;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const d = new Date(today);

  // Check from today backwards
  for (let i = 0; i < 365; i++) {
    const dateStr = formatDate(d);
    if (appData.checkins[dateStr]) {
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      // Allow today to be unchecked (streak from yesterday counts)
      if (i === 0) {
        d.setDate(d.getDate() - 1);
        continue;
      }
      break;
    }
  }
  document.getElementById('streakCount').textContent = streak;
}

function doCheckin() {
  const todayStr = formatDate(new Date());
  if (appData.checkins[todayStr]) {
    showToast('今天已经打过卡啦~ 💕');

  appData.checkins[todayStr] = true;

// Compress image before saving
function compressImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSize = 800;
      let w = img.width, h = img.height;
      if (w > h) { if (w > maxSize) { h *= maxSize / w; w = maxSize; } }
      else { if (h > maxSize) { w *= maxSize / h; h = maxSize; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = URL.createObjectURL(file);
  });
}

async function addStory() {
  const date = document.getElementById('storyDate').value;
  const text = document.getElementById('storyText').value.trim();
  const mediaInput = document.getElementById('storyMedia');

  if (!date) { showToast('请选择日期'); return; }
  if (!text) { showToast('请写下故事内容'); return; }

  showToast('⏳ 正在处理图片...');

  const story = {
    date,
    text,
    images: [],
    video: null,
    comments: [],
  };

  const files = mediaInput.files;
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (file.type.startsWith('video/')) {
      // Videos: keep small, use data URL directly (videos should be short clips)
      const dataUrl = await new Promise(r => { const fr = new FileReader(); fr.onload = e => r(e.target.result); fr.readAsDataURL(file.slice(0, 2*1024*1024)); });
      story.video = dataUrl;
    } else if (file.type.startsWith('image/')) {
      const compressed = await compressImage(file);
      story.images.push(compressed);
    }
  }

  finalizeAddStory(story);
}

function finalizeAddStory(story) {
  appData.stories.push(story);
  saveData(appData);
  hideAddStoryForm();
  renderStories();
  showToast('✅ 故事保存成功！');
}

function uploadAvatar(person) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      showToast('⚠️ 图片不能超过10MB');
      return;
    }
    // Compress image to small size before saving
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSize = 200;
      let w = img.width, h = img.height;
      if (w > h) { if (w > maxSize) { h *= maxSize / w; w = maxSize; } }
      else { if (h > maxSize) { w *= maxSize / h; h = maxSize; } }
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const compressed = canvas.toDataURL('image/jpeg', 0.7);
      appData.profiles[person].avatar = compressed;
      saveData(appData);
      saveToCloud(appData); // Force immediate cloud save
      renderProfiles();
      showToast('✅ 头像已更新！');
    };
    img.src = URL.createObjectURL(file);
  };
  input.click();
}

  saveData(appData);
}

function init() {
  updateDaysCounter();
  autoFillCheckins();
  initCalendar();
  renderDishes();
  renderLotteryHistory();
  renderSnackCategories();
  renderSnackList();
  renderStories();
  renderProfiles();
  createFloatingHearts();

  // Start cloud sync (polls every 5s)
  startCloudSync();

  // Set today's date for story form
  document.getElementById('storyDate').value = formatDate(new Date());

  // Refresh days counter at midnight
  const now = new Date();
  const msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).getTime() - now.getTime();
  setTimeout(() => {
    updateDaysCounter();
    renderCalendar();
    setInterval(() => {
      updateDaysCounter();
      renderCalendar();
    }, 86400000);
  }, msToMidnight + 1000);

  console.log('💕 王俊龙 ❤️ 贺一帆 的恋爱小屋已就绪！');
  console.log('👑 皇帝一二 & ⚔️ 侍卫布布 欢迎你们！');
  console.log('在一起已经 ' + getDaysTogether() + ' 天啦~');
}

// Run on load
window.addEventListener('DOMContentLoaded', init);
</script>
